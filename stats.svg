<svg width="420" height="195" viewBox="0 0 420 195" fill="none" xmlns="http://www.w3.org/2000/svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
        @keyframes bar-load {
            from { clip-path: inset(0 100% 0 0); }
            to { clip-path: inset(0 0 0 0); }
        }
        @keyframes typewriter {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .typewriter-char {
            opacity: 0;
            animation: typewriter 0.15s ease-out forwards;
        }
        .mono { font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace; }
        .title { font-size: 10px; font-weight: 700; fill: #d79921; }
        .header { font-size: 12px; font-weight: 700; fill: #d79921; }
        .label { font-size: 11px; fill: #7c6f64; }
        .value { font-size: 11px; font-weight: 700; fill: #d4be98; }
        .bar-text { font-size: 9px; }
        .bar-fill { fill: #b8bb26; animation: bar-load 1s ease-out forwards; }
        .bar-empty { fill: #7c6f64; opacity: 0.5; }
        .hint { font-size: 9px; fill: #7c6f64; }
        .key { fill: #d79921; }
    </style>

    <!-- Background -->
    <rect x="1" y="1" width="418" height="193" rx="0" fill="#161b22"/>

    <!-- Left/Right borders -->
    <rect x="8" y="14" width="1.5" height="167" fill="#3c3836"/>
    <rect x="410" y="14" width="1.5" height="167" fill="#3c3836"/>

    <!-- Top/Bottom borders -->
    <rect x="8" y="6" width="404" height="1.5" fill="#3c3836"/>
    <rect x="8" y="187" width="404" height="1.5" fill="#3c3836"/>

    <!-- Corner pixels -->
    <rect x="6" y="6" width="4" height="4" rx="1" fill="#3c3836"/>
    <rect x="410" y="6" width="4" height="4" rx="1" fill="#3c3836"/>
    <rect x="6" y="185" width="4" height="4" rx="1" fill="#3c3836"/>
    <rect x="410" y="185" width="4" height="4" rx="1" fill="#3c3836"/>

    <!-- Title bar -->
    <rect x="150" y="2" width="120" height="12" fill="#161b22"/>
    <text x="210" y="12" text-anchor="middle" class="mono title">┤ y4nder ├</text>

    <!-- Stats section header -->
    <text x="20" y="30" class="mono header">─ GitHub Stats -------------------------------------</text>

    <!-- Stats grid -->
    <text x="25" y="48" class="mono label">STARS</text>
        <text x="105" y="48" class="mono value"><tspan class="typewriter-char" style="animation-delay: 0s">1</tspan><tspan class="typewriter-char" style="animation-delay: 0.08s">3</tspan></text>

        <text x="165" y="47" class="mono bar-text" xml:space="preserve"><tspan class="bar-fill" fill="#b8bb26" style="animation-delay: 0s"></tspan><tspan class="bar-empty" fill="#7c6f64" opacity="0.5">⣀⣀⣀⣀⣀⣀⣀⣀⣀⣀⣀⣀⣀⣀</tspan></text>
    <text x="25" y="68" class="mono label">FORKS</text>
        <text x="105" y="68" class="mono value"><tspan class="typewriter-char" style="animation-delay: 0.15s">1</tspan></text>

        <text x="165" y="67" class="mono bar-text" xml:space="preserve"><tspan class="bar-fill" fill="#b8bb26" style="animation-delay: 0.15s"></tspan><tspan class="bar-empty" fill="#7c6f64" opacity="0.5">⣀⣀⣀⣀⣀⣀⣀⣀⣀⣀⣀⣀⣀⣀</tspan></text>
    <text x="25" y="88" class="mono label">REPOS</text>
        <text x="105" y="88" class="mono value"><tspan class="typewriter-char" style="animation-delay: 0.3s">5</tspan><tspan class="typewriter-char" style="animation-delay: 0.38s">7</tspan></text>

        
    <text x="25" y="108" class="mono label">FOLLOWERS</text>
        <text x="105" y="108" class="mono value"><tspan class="typewriter-char" style="animation-delay: 0.45000002s">3</tspan><tspan class="typewriter-char" style="animation-delay: 0.53000003s">2</tspan></text>

        <text x="210" y="108" class="mono label">FOLLOWING</text>
        <text x="290" y="108" class="mono value"><tspan class="typewriter-char" style="animation-delay: 0.6s">4</tspan><tspan class="typewriter-char" style="animation-delay: 0.68s">6</tspan></text>


    <!-- Process-style info section -->
    <text x="20" y="130" class="mono header">─ Summary ------------------------------------------</text>
    <text x="25" y="150" class="mono label">total-impact:</text>
        <text x="105" y="150" class="mono value"><tspan class="typewriter-char" style="animation-delay: 0.75s">1</tspan><tspan class="typewriter-char" style="animation-delay: 0.83s">4</tspan></text>

        <text x="210" y="150" class="mono label">pub-repos:</text>
        <text x="290" y="150" class="mono value"><tspan class="typewriter-char" style="animation-delay: 0.90000004s">5</tspan><tspan class="typewriter-char" style="animation-delay: 0.98s">7</tspan></text>


    <!-- Footer hint -->
    <text x="210" y="180" text-anchor="middle" class="mono hint">
        <tspan class="key">[T]</tspan> Theme  <tspan class="key">[U]</tspan> User
    </text>
</svg>