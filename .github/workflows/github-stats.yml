name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"   # Runs daily at midnight UTC
  workflow_dispatch:      # Allows manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write     # Required to commit the SVG

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Generate Stats Card
      - name: Generate Stats Card
        uses: y4nder/ygithub-stats-action@v1
        with:
          username: y4nder
          card: stats
          theme: gruvbox
          output: stats.svg
          token: ${{ secrets.GH_TOKEN }}

      # Generate Languages Card
      - name: Generate Languages Card
        uses: y4nder/ygithub-stats-action@v1
        with:
          username: y4nder
          card: languages
          theme: gruvbox
          output: languages.svg
          token: ${{ secrets.GH_TOKEN }}

      # Generate Contributions Card
      - name: Generate Contributions Card
        uses: y4nder/ygithub-stats-action@v1
        with:
          username: y4nder
          card: contributions
          theme: gruvbox
          output: contributions.svg
          token: ${{ secrets.GH_TOKEN }}

      # Commit updated SVG files
      - name: Commit and Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add *.svg
          git commit -m "Update GitHub stats" || exit 0
          git push
