<svg width="420" height="270" viewBox="0 0 420 270" fill="none" xmlns="http://www.w3.org/2000/svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
        @keyframes bar-load {
            from { clip-path: inset(0 100% 0 0); }
            to { clip-path: inset(0 0 0 0); }
        }
        @keyframes typewriter {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .typewriter-char {
            opacity: 0;
            animation: typewriter 0.15s ease-out forwards;
        }
        .mono { font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace; }
        .title { font-size: 10px; font-weight: 700; fill: #d79921; }
        .header { font-size: 12px; font-weight: 700; fill: #d79921; }
        .label { font-size: 11px; fill: #7c6f64; }
        .value { font-size: 11px; font-weight: 700; }
        .pct { font-size: 11px; fill: #d4be98; }
        .pct-value { font-family: monospace; font-size: 12px; fill: #7c6f64; text-anchor: end; }
        .col-header { font-size: 10px; fill: #7c6f64; }
        .hint { font-size: 9px; fill: #7c6f64; }
        .key { fill: #d79921; }
        .bar-fill { animation: bar-load 1s ease-out forwards; }
    </style>

    <!-- Background -->
    <rect x="1" y="1" width="418" height="268" rx="0" fill="#161b22"/>

    <!-- Borders -->
    <rect x="8" y="14" width="1.5" height="242" fill="#3c3836"/>
    <rect x="410" y="14" width="1.5" height="242" fill="#3c3836"/>
    <rect x="8" y="6" width="404" height="1.5" fill="#3c3836"/>
    <rect x="8" y="262" width="404" height="1.5" fill="#3c3836"/>

    <!-- Corner pixels -->
    <rect x="6" y="6" width="4" height="4" rx="1" fill="#3c3836"/>
    <rect x="410" y="6" width="4" height="4" rx="1" fill="#3c3836"/>
    <rect x="6" y="260" width="4" height="4" rx="1" fill="#3c3836"/>
    <rect x="410" y="260" width="4" height="4" rx="1" fill="#3c3836"/>

    <!-- Title bar -->
    <rect x="150" y="2" width="120" height="12" fill="#161b22"/>
    <text x="210" y="16" text-anchor="middle" class="mono title">┤ y4nder ├</text>

    <!-- Section header -->
    <text x="20" y="36" class="mono header">- Languages ----------------------------------------</text>

    <!-- Column headers -->
    <g transform="translate(25, 56)">
        <text x="0" y="0" class="mono col-header">LANG</text>
        <text x="100" y="0" class="mono col-header">USAGE</text>
        <text x="340" y="0" class="mono col-header">%</text>
    </g>

    <!-- Language rows -->
    <g transform="translate(25, 14)">
        <text x="0" y="68" fill="#81a1c1" font-family="monospace" font-size="11">
        Java
        </text>
<text x="100" y="68" font-family="monospace" font-size="12">
        <tspan class="bar-fill" fill="#81a1c1" style="animation-delay: 0s">██████████</tspan><tspan fill="#7c6f64">░░░░░░░░░░░░░░</tspan>
        </text>
<text x="350" y="68" class="pct-value"><tspan class="typewriter-char" style="animation-delay: 0s">4</tspan><tspan class="typewriter-char" style="animation-delay: 0.08s">3</tspan><tspan class="typewriter-char" style="animation-delay: 0.16s">.</tspan><tspan class="typewriter-char" style="animation-delay: 0.24s">2</tspan><tspan class="typewriter-char" style="animation-delay: 0.32s">%</tspan></text>
<text x="0" y="90" fill="#5e81ac" font-family="monospace" font-size="11">
        C#
        </text>
<text x="100" y="90" font-family="monospace" font-size="12">
        <tspan class="bar-fill" fill="#5e81ac" style="animation-delay: 0.15s">███</tspan><tspan fill="#7c6f64">░░░░░░░░░░░░░░░░░░░░░</tspan>
        </text>
<text x="350" y="90" class="pct-value"><tspan class="typewriter-char" style="animation-delay: 0.15s">1</tspan><tspan class="typewriter-char" style="animation-delay: 0.23s">3</tspan><tspan class="typewriter-char" style="animation-delay: 0.31s">.</tspan><tspan class="typewriter-char" style="animation-delay: 0.39s">6</tspan><tspan class="typewriter-char" style="animation-delay: 0.47s">%</tspan></text>
<text x="0" y="112" fill="#ebcb8b" font-family="monospace" font-size="11">
        TypeScript
        </text>
<text x="100" y="112" font-family="monospace" font-size="12">
        <tspan class="bar-fill" fill="#ebcb8b" style="animation-delay: 0.3s">███</tspan><tspan fill="#7c6f64">░░░░░░░░░░░░░░░░░░░░░</tspan>
        </text>
<text x="350" y="112" class="pct-value"><tspan class="typewriter-char" style="animation-delay: 0.3s">1</tspan><tspan class="typewriter-char" style="animation-delay: 0.38s">3</tspan><tspan class="typewriter-char" style="animation-delay: 0.46s">.</tspan><tspan class="typewriter-char" style="animation-delay: 0.54s">6</tspan><tspan class="typewriter-char" style="animation-delay: 0.62s">%</tspan></text>
<text x="0" y="134" fill="#88c0d0" font-family="monospace" font-size="11">
        Python
        </text>
<text x="100" y="134" font-family="monospace" font-size="12">
        <tspan class="bar-fill" fill="#88c0d0" style="animation-delay: 0.45000002s">███</tspan><tspan fill="#7c6f64">░░░░░░░░░░░░░░░░░░░░░</tspan>
        </text>
<text x="350" y="134" class="pct-value"><tspan class="typewriter-char" style="animation-delay: 0.45000002s">1</tspan><tspan class="typewriter-char" style="animation-delay: 0.53000003s">1</tspan><tspan class="typewriter-char" style="animation-delay: 0.61s">.</tspan><tspan class="typewriter-char" style="animation-delay: 0.69s">4</tspan><tspan class="typewriter-char" style="animation-delay: 0.77s">%</tspan></text>
<text x="0" y="156" fill="#d08770" font-family="monospace" font-size="11">
        Rust
        </text>
<text x="100" y="156" font-family="monospace" font-size="12">
        <tspan class="bar-fill" fill="#d08770" style="animation-delay: 0.6s">██</tspan><tspan fill="#7c6f64">░░░░░░░░░░░░░░░░░░░░░░</tspan>
        </text>
<text x="350" y="156" class="pct-value"><tspan class="typewriter-char" style="animation-delay: 0.6s">6</tspan><tspan class="typewriter-char" style="animation-delay: 0.68s">.</tspan><tspan class="typewriter-char" style="animation-delay: 0.76s">8</tspan><tspan class="typewriter-char" style="animation-delay: 0.84000003s">%</tspan></text>
<text x="0" y="178" fill="#d08770" font-family="monospace" font-size="11">
        C
        </text>
<text x="100" y="178" font-family="monospace" font-size="12">
        <tspan class="bar-fill" fill="#d08770" style="animation-delay: 0.75s">█</tspan><tspan fill="#7c6f64">░░░░░░░░░░░░░░░░░░░░░░░</tspan>
        </text>
<text x="350" y="178" class="pct-value"><tspan class="typewriter-char" style="animation-delay: 0.75s">4</tspan><tspan class="typewriter-char" style="animation-delay: 0.83s">.</tspan><tspan class="typewriter-char" style="animation-delay: 0.90999997s">5</tspan><tspan class="typewriter-char" style="animation-delay: 0.99s">%</tspan></text>
<text x="0" y="200" fill="#ebcb8b" font-family="monospace" font-size="11">
        JavaScript
        </text>
<text x="100" y="200" font-family="monospace" font-size="12">
        <tspan class="bar-fill" fill="#ebcb8b" style="animation-delay: 0.90000004s">█</tspan><tspan fill="#7c6f64">░░░░░░░░░░░░░░░░░░░░░░░</tspan>
        </text>
<text x="350" y="200" class="pct-value"><tspan class="typewriter-char" style="animation-delay: 0.90000004s">4</tspan><tspan class="typewriter-char" style="animation-delay: 0.98s">.</tspan><tspan class="typewriter-char" style="animation-delay: 1.0600001s">5</tspan><tspan class="typewriter-char" style="animation-delay: 1.14s">%</tspan></text>
<text x="0" y="222" fill="#b48ead" font-family="monospace" font-size="11">
        Lua
        </text>
<text x="100" y="222" font-family="monospace" font-size="12">
        <tspan class="bar-fill" fill="#b48ead" style="animation-delay: 1.0500001s">█</tspan><tspan fill="#7c6f64">░░░░░░░░░░░░░░░░░░░░░░░</tspan>
        </text>
<text x="350" y="222" class="pct-value"><tspan class="typewriter-char" style="animation-delay: 1.0500001s">2</tspan><tspan class="typewriter-char" style="animation-delay: 1.1300001s">.</tspan><tspan class="typewriter-char" style="animation-delay: 1.21s">3</tspan><tspan class="typewriter-char" style="animation-delay: 1.2900001s">%</tspan></text>

    </g>

    <!-- Footer hint -->
    <text x="210" y="255" text-anchor="middle" class="mono hint">
        <tspan class="key">[L]</tspan> Langs  <tspan class="key">[T]</tspan> Theme
    </text>
</svg>